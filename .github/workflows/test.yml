name: test

on:
    push:
        branches:
            - 'main'
        paths:
            - '.github/workflows/test.yml'
            - '3rdparty/**'
            - 'cmake/**'
            - 'include/**'
            - 'source/**'
            - 'CMakeLists.txt'
            - 'test/**'

    pull_request:
        branches:
            - '**'
        paths:
            - '.github/workflows/test.yml'
            - '3rdparty/**'
            - 'cmake/**'
            - 'include/**'
            - 'source/**'
            - 'CMakeLists.txt'
            - 'test/**'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}${{ github.ref == 'refs/heads/main' && format('-{0}', github.sha) || '' }}
    cancel-in-progress: true

jobs:
    meta:
        uses: ./.github/workflows/meta.yml

    windows:
        needs: meta
        runs-on: windows-2025-vs2026
        strategy:
            matrix:
                arch: [x86_64]
            fail-fast: false

        steps:
            - name: Windows runner hack
              shell: cmd
              run: |
                  dir d:\a
                  cd ..
                  mkdir C:\MaaFramework
                  rmdir MaaFramework
                  mklink /j MaaFramework C:\MaaFramework
                  dism /Online /Disable-Feature /FeatureName:Windows-Defender /Remove /NoRestart /Quiet
                  cd .

            - name: Windows runner hack (2)
              uses: al-cheb/configure-pagefile-action@v1.4
              with:
                  minimum-size: 16GB
                  maximum-size: 16GB
                  disk-root: 'D:'

            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup Windows 10 SDK
              uses: GuillaumeFalourd/setup-windows10-sdk-action@v2.2
              with:
                  sdk-version: 26100

            - name: Setup Python
              uses: actions/setup-python@v5.2.0
              with:
                  python-version: '3.9'

            - name: Bootstrap MaaDeps
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  python3 tools/maadeps-download.py ${{ matrix.arch == 'x86_64' && 'x64' || 'arm64' }}-windows

            - uses: pnpm/action-setup@v4
              with:
                  version: latest

            - name: Use Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Prepare Node Binding
              shell: bash
              run: |
                  cd source/binding/NodeJS
                  pnpm i
                  mkdir -p release/maa-node/dist
                  cp src/apis/*.d.ts release/maa-node/dist
                  cp release/maa-node/src/*.js release/maa-node/dist

            - name: Build MAA
              run: |
                  cmake --preset "${{ matrix.arch == 'x86_64' && 'MSVC 2022' || 'MSVC 2022 ARM' }}" -DMAADEPS_TRIPLET="maa-${{ matrix.arch == 'x86_64' && 'x64' || 'arm64' }}-windows" -DCMAKE_SYSTEM_VERSION="10.0.26100.0" -DMAA_HASH_VERSION='${{ needs.meta.outputs.tag }}' -DWITH_NODEJS_BINDING=ON -DWITH_QUICKJS_BINDING=ON -DBUILD_PICLI=OFF -DWITH_REPLAY_CONTROLLER=ON -DWITH_DBG_CONTROLLER=ON -DBUILD_PIPELINE_TESTING=ON -DBUILD_DLOPEN_TESTING=ON

                  cmake --build build --preset "${{ matrix.arch == 'x86_64' && 'MSVC 2022' || 'MSVC 2022 ARM' }} - Debug" -j 16

            - name: Install
              shell: bash
              run: |
                  cmake --install build --prefix install --config Debug

            - name: Download Plugin
              uses: robinraju/release-downloader@v1
              with:
                  repository: MaaXYZ/MaaPluginDemo
                  tag: ${{ needs.meta.outputs.latest-plugin }}
                  fileName: '*win-${{ matrix.arch }}*'
                  out-file-path: 'build/download_plugins'
                  extract: true
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Plugin
              shell: bash
              run: |
                  cp -r build/download_plugins/bin install/bin/plugins

            - name: Run DlopenTesting
              # TODO: qemu for aarch64
              if: ${{matrix.arch == 'x86_64'}}
              shell: bash
              run: |
                  ./install/bin/DlopenTesting

            - name: Run PipelineTesting
              # TODO: qemu for aarch64
              if: ${{matrix.arch == 'x86_64'}}
              shell: bash
              run: |
                  ./install/bin/PipelineTesting.exe ./install/test

            - name: Run Python testing
              shell: bash
              run: |
                  python3 -m pip install ./source/binding/Python
                  python3 ./test/python/binding_test.py ./source/binding/Python ./install
                  python3 ./test/python/pipeline_test.py ./source/binding/Python ./install
                  python3 ./test/agent/agent_main_test.py ./source/binding/Python ./install
                  python3 ./test/agent/agent_tcp_main_test.py ./source/binding/Python ./install

            - name: Run NodeJS testing
              shell: bash
              run: |
                  cd test/nodejs
                  pnpm i
                  node binding.ts

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: MAA-win-${{ matrix.arch }}-text_log
                  path: 'install/bin/debug/*.log'

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: MAA-win-${{ matrix.arch }}-full
                  path: 'install'

    ubuntu:
        needs: meta
        runs-on: ubuntu-latest
        strategy:
            matrix:
                arch: [x86_64]
            fail-fast: false

        steps:
            - name: Install dep
              run: |
                  sudo apt-get update -y
                  sudo apt-get install -y ninja-build cmake ccache libpipewire-0.3-dev libdbus-1-dev

            # https://github.com/MaaXYZ/MaaFramework/actions/runs/5643408179/job/15285186255
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup ccache
              uses: Chocobo1/setup-ccache-action@v1
              with:
                  remove_stale_cache: false

            - name: Setup Python
              uses: actions/setup-python@v5.2.0
              with:
                  python-version: '3.9'

            - name: Bootstrap MaaDeps
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  python3 tools/maadeps-download.py ${{ matrix.arch == 'x86_64' && 'x64' || 'arm64' }}-linux

            - name: Inject ARM64 Dependencies
              if: matrix.arch == 'aarch64'
              run: |
                  echo "Installing ARM64 cross-compile dependencies..."
                  sudo dpkg --add-architecture arm64
                  sudo sed -i 's/^deb http/deb [arch=amd64] http/g' /etc/apt/sources.list 2>/dev/null || true
                  sudo sed -i 's/^deb mirror/deb [arch=amd64] mirror/g' /etc/apt/sources.list 2>/dev/null || true
                  if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
                      sudo sed -i 's/^Types: deb$/Types: deb\nArchitectures: amd64/g' /etc/apt/sources.list.d/ubuntu.sources
                  fi

                  sudo sh -c 'echo "Types: deb" > /etc/apt/sources.list.d/ubuntu-arm64.sources'
                  sudo sh -c 'echo "URIs: http://ports.ubuntu.com/ubuntu-ports" >> /etc/apt/sources.list.d/ubuntu-arm64.sources'
                  sudo sh -c 'echo "Suites: noble noble-updates noble-security" >> /etc/apt/sources.list.d/ubuntu-arm64.sources'
                  sudo sh -c 'echo "Components: main universe restricted multiverse" >> /etc/apt/sources.list.d/ubuntu-arm64.sources'
                  sudo sh -c 'echo "Architectures: arm64" >> /etc/apt/sources.list.d/ubuntu-arm64.sources'

                  sudo apt-get update -y

                  mkdir -p arm64_deps && cd arm64_deps
                  sudo apt-get download libdbus-1-dev:arm64 libdbus-1-3:arm64 libpipewire-0.3-dev:arm64 libpipewire-0.3-0t64:arm64 libspa-0.2-dev:arm64 libspa-0.2-modules:arm64

                  mkdir -p ../extracted
                  for deb in *.deb; do
                      dpkg -x "$deb" ../extracted
                  done
                  cd ..

                  SYSROOT_DIR="${GITHUB_WORKSPACE}/source/MaaUtils/MaaDeps/x-tools/aarch64-linux-gnu/aarch64-linux-gnu/sysroot"

                  # 确保目录结构存在后再拷贝
                  sudo mkdir -p "$SYSROOT_DIR/usr/include"
                  sudo mkdir -p "$SYSROOT_DIR/usr/lib"

                  sudo cp -r ./extracted/usr/include/* "$SYSROOT_DIR/usr/include/"
                  sudo cp -r ./extracted/usr/lib/aarch64-linux-gnu/* "$SYSROOT_DIR/usr/lib/"

            - uses: pnpm/action-setup@v4
              with:
                  version: latest

            - name: Use Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Prepare Node Binding
              shell: bash
              run: |
                  cd source/binding/NodeJS
                  pnpm i
                  mkdir -p release/maa-node/dist
                  cp src/apis/*.d.ts release/maa-node/dist
                  cp release/maa-node/src/*.js release/maa-node/dist

            - name: Build MAA
              run: |
                  cmake --preset 'NinjaMulti Linux ${{ matrix.arch == 'x86_64' && 'x64' || 'arm64' }}' \
                    -DMAADEPS_TRIPLET='maa-${{ matrix.arch == 'x86_64' && 'x64' || 'arm64' }}-linux' \
                    -DMAA_HASH_VERSION='${{ needs.meta.outputs.tag }}' \
                    -DWITH_NODEJS_BINDING=ON -DWITH_QUICKJS_BINDING=ON \
                    -DBUILD_PICLI=OFF \
                    -DWITH_REPLAY_CONTROLLER=ON -DWITH_DBG_CONTROLLER=ON -DBUILD_PIPELINE_TESTING=ON \
                    -DBUILD_DLOPEN_TESTING=ON

                  cmake --build build --preset 'NinjaMulti Linux ${{ matrix.arch == 'x86_64' && 'x64' || 'arm64' }} - Debug' -j 16

            - name: Install
              shell: bash
              run: |
                  cmake --install build --prefix install --config Debug

            - name: Download Plugin
              uses: robinraju/release-downloader@v1
              with:
                  repository: MaaXYZ/MaaPluginDemo
                  tag: ${{ needs.meta.outputs.latest-plugin }}
                  fileName: '*linux-${{ matrix.arch }}*'
                  out-file-path: 'build/download_plugins'
                  extract: true
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Plugin
              shell: bash
              run: |
                  cp -r build/download_plugins/bin install/bin/plugins

            - name: Run DlopenTesting
              # TODO: qemu for aarch64
              if: ${{matrix.arch == 'x86_64'}}
              shell: bash
              run: |
                  ./install/bin/DlopenTesting

            - name: Run PipelineTesting
              # TODO: qemu for aarch64
              if: ${{matrix.arch == 'x86_64'}}
              shell: bash
              run: |
                  ./install/bin/PipelineTesting ./install/test

            - name: Run Python testing
              shell: bash
              run: |
                  python3 -m venv .venv
                  source .venv/bin/activate
                  python3 -m pip install ./source/binding/Python
                  python3 ./test/python/binding_test.py ./source/binding/Python ./install
                  python3 ./test/python/pipeline_test.py ./source/binding/Python ./install
                  python3 ./test/agent/agent_main_test.py ./source/binding/Python ./install
                  python3 ./test/agent/agent_tcp_main_test.py ./source/binding/Python ./install

            - name: Run NodeJS testing
              shell: bash
              run: |
                  cd test/nodejs
                  pnpm i
                  node binding.ts

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: MAA-linux-${{ matrix.arch }}-text_log
                  path: 'install/bin/debug/*.log'

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: MAA-linux-${{ matrix.arch }}-full
                  path: 'install'

    macos:
        needs: meta
        strategy:
            matrix:
                arch: [aarch64]
            fail-fast: false
        runs-on: macos-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: 16.2

            - name: Install dep
              run: |
                  brew install ninja ccache

            - name: Setup ccache
              uses: Chocobo1/setup-ccache-action@v1
              with:
                  remove_stale_cache: false

            - name: Setup Python
              uses: actions/setup-python@v5.2.0
              with:
                  python-version: '3.9'

            - name: Bootstrap MaaDeps
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  python3 tools/maadeps-download.py ${{ matrix.arch == 'x86_64' && 'x64' || 'arm64' }}-osx

            - uses: pnpm/action-setup@v4
              with:
                  version: latest

            - name: Use Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Prepare Node Binding
              shell: bash
              run: |
                  cd source/binding/NodeJS
                  pnpm i
                  mkdir -p release/maa-node/dist
                  cp src/apis/*.d.ts release/maa-node/dist
                  cp release/maa-node/src/*.js release/maa-node/dist

            - name: Build MAA
              run: |
                  cmake --preset 'NinjaMulti' \
                    -DMAADEPS_TRIPLET='maa-${{ matrix.arch == 'x86_64' && 'x64' || 'arm64' }}-osx' \
                    -DMAA_HASH_VERSION='${{ needs.meta.outputs.tag }}' \
                    -DCMAKE_OSX_SYSROOT=macosx \
                    -DWITH_NODEJS_BINDING=ON -DWITH_QUICKJS_BINDING=ON \
                    -DBUILD_PICLI=OFF \
                    -DWITH_REPLAY_CONTROLLER=ON -DWITH_DBG_CONTROLLER=ON -DBUILD_PIPELINE_TESTING=ON \
                    -DBUILD_DLOPEN_TESTING=ON \
                    -DCMAKE_OSX_ARCHITECTURES='${{ matrix.arch == 'x86_64' && 'x86_64' || 'arm64' }}'

                  cmake --build build --preset 'NinjaMulti - Debug' -j 16

            - name: Install
              shell: bash
              run: |
                  cmake --install build --prefix install --config Debug

            - name: Download Plugin
              uses: robinraju/release-downloader@v1
              with:
                  repository: MaaXYZ/MaaPluginDemo
                  tag: ${{ needs.meta.outputs.latest-plugin }}
                  fileName: '*macos-${{ matrix.arch }}*'
                  out-file-path: 'build/download_plugins'
                  extract: true
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Plugin
              shell: bash
              run: |
                  cp -r build/download_plugins/bin install/bin/plugins

            - name: Run DlopenTesting
              shell: bash
              run: |
                  ./install/bin/DlopenTesting

            - name: Run PipelineTesting
              shell: bash
              run: |
                  ./install/bin/PipelineTesting ./install/test

            - name: Run Python testing
              shell: bash
              run: |
                  python3 -m venv .venv
                  source .venv/bin/activate
                  python3 -m pip install ./source/binding/Python
                  python3 ./test/python/binding_test.py ./source/binding/Python ./install
                  python3 ./test/python/pipeline_test.py ./source/binding/Python ./install
                  python3 ./test/agent/agent_main_test.py ./source/binding/Python ./install
                  python3 ./test/agent/agent_tcp_main_test.py ./source/binding/Python ./install

            - name: Run NodeJS testing
              shell: bash
              run: |
                  cd test/nodejs
                  pnpm i
                  node binding.ts

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: MAA-macos-${{ matrix.arch }}-text_log
                  path: 'install/bin/debug/*.log'

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: MAA-macos-${{ matrix.arch }}-full
                  path: 'install'
